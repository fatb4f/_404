# Smart-splits integration for Kitty.
#
# Use Alt-h/j/k/l for pane movement everywhere, and pass the keys through to
# Neovim when the focused window advertises the IS_NVIM user variable.

map alt+h neighboring_window left
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+l neighboring_window right

# Let Neovim handle these keys when smart-splits.nvim is active.
map --when-focus-on var:IS_NVIM alt+h
map --when-focus-on var:IS_NVIM alt+j
map --when-focus-on var:IS_NVIM alt+k
map --when-focus-on var:IS_NVIM alt+l

# Relative resizing keeps the left/right/up/down mental model regardless of
# the active Kitty layout.
map alt+shift+h kitten helpers/relative_resize.py left 3
map alt+shift+j kitten helpers/relative_resize.py down 3
map alt+shift+k kitten helpers/relative_resize.py up 3
map alt+shift+l kitten helpers/relative_resize.py right 3

map --when-focus-on var:IS_NVIM alt+shift+h
map --when-focus-on var:IS_NVIM alt+shift+j
map --when-focus-on var:IS_NVIM alt+shift+k
map --when-focus-on var:IS_NVIM alt+shift+l
