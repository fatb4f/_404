name: arch-usb

on:
  workflow_dispatch:

jobs:
  build-rootfs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Restore rootfs cache
        id: rootfs-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/arch-rootfs.tar.zst
          key: arch-rootfs-${{ runner.os }}-${{ hashFiles('scripts/build-rootfs.sh') }}

      - name: Install build dependencies
        if: steps.rootfs-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Build rootfs artifact
        if: steps.rootfs-cache.outputs.cache-hit != 'true'
        run: |
          ARCH_ROOTFS_TAR="$RUNNER_TEMP/arch-rootfs.tar" \
          ARCH_ROOTFS_TAR_ZST="$RUNNER_TEMP/arch-rootfs.tar.zst" \
            bash ./scripts/build-rootfs.sh

      - name: Save rootfs cache
        if: steps.rootfs-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/arch-rootfs.tar.zst
          key: arch-rootfs-${{ runner.os }}-${{ hashFiles('scripts/build-rootfs.sh') }}

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-rootfs
          path: |
            ${{ runner.temp }}/arch-rootfs.tar.zst
          if-no-files-found: error

  build-image:
    runs-on: ubuntu-24.04
    needs: build-rootfs
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip qemu-utils gdisk e2fsprogs cgpt zstd

      - name: Download rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: arch-rootfs
          path: ${{ runner.temp }}/rootfs

      - name: Build arch USB image
        run: |
          ARCH_USB_RAW="$RUNNER_TEMP/arch-usb.raw" \
          ARCH_USB_ROOTFS_TAR_ZST="$RUNNER_TEMP/rootfs/arch-rootfs.tar.zst" \
            bash ./scripts/build-arch-usb.sh

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-usb
          path: |
            ${{ runner.temp }}/arch-usb.raw
          if-no-files-found: error
