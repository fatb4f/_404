name: arch-usb

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl qemu-utils

      - name: Build arch USB image
        run: |
          ARCH_USB_RAW="$RUNNER_TEMP/arch-usb.raw" \
            bash ./scripts/build-arch-usb.sh

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-usb
          path: |
            ${{ runner.temp }}/arch-usb.raw
          if-no-files-found: error
