map_timeout 1.25

# Command palette and common shell interactions stay global.
map ctrl+shift+escape command_palette
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map shift+insert paste_from_clipboard
map ctrl+shift+backspace send_signal SIGINT
map ctrl+alt+u kitten unicode_input
map ctrl+shift+delete clear_terminal reset active

# Tab and window management stays global.
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+tab send_text normal,application /home/x404/.local/bin/kitty-work-tab\r
map ctrl+shift+n launch --type=os-window --os-window-state=maximized --cwd=current
map ctrl+shift+q close_tab
map ctrl+shift+w close_window
map ctrl+shift+alt+q close_os_window

# Session entrypoints stay direct.
map ctrl+shift+alt+c goto_session /home/x404/.config/kitty/sessions/codex.session
map ctrl+shift+alt+w goto_session /home/x404/.config/kitty/sessions/work.session

# Administrative shortcuts stay direct.
map ctrl+alt+r load_config_file
map ctrl+shift+alt+comma edit_config_file
map ctrl+shift+alt+d debug_config

# Shared help launcher for mode-local keymap previews.
action_alias show_keymap_help combine : pop_keyboard_mode : launch --type=os-window --os-window-state=maximized --cwd=current kitten choose-files /home/x404/.config/kitty/fragments/keymaps
