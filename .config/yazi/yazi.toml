[mgr]
ratio = [1, 2, 5]
title_format = "test"

[opener]
edit = [{ run = 'nvim "$@"', block = true, for = "unix" }]
open = [{ run = 'xdg-open "$1"', orphan = true, desc = "Open", for = "linux" }]
extract = [{ run = "ya pub extract --list %s", desc = "Extract here" }]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { name = "*.md", use = "edit" },
  { name = "*.txt", use = "edit" },
  { name = "*.jsonl", use = "edit" },
  { name = "*.ndjson", use = "edit" },
  { name = "*.lua", use = "edit" },
  { name = "*.toml", use = "edit" },
  { name = "*.yaml", use = "edit" },
  { name = "*.yml", use = "edit" },
  { name = "*.json", use = "edit" },
  { name = "*.cue", use = "edit" },
  { name = "*.conf", use = "edit" },
  { name = "*.tmux.conf", use = "edit" },
  { name = "*.sh", use = "edit" },
  { name = "*.py", use = "edit" },
  { name = "*.rs", use = "edit" },
  { name = "*.go", use = "edit" },
  { name = "*.ts", use = "edit" },
  { name = "*.tsx", use = "edit" },
  { name = "*.js", use = "edit" },
  { name = "*.jsx", use = "edit" },
]

[[plugin.prepend_previewers]]
url = "**/.git/"
run = "preview-git"

[[plugin.prepend_previewers]]
url = "*.json"
run = 'piper -- jq -C . "$1"'

[[plugin.prepend_previewers]]
url = "*.md"
run = 'piper -- rich -j --left --panel=rounded --guides --line-numbers --force-terminal "$1"'

[[plugin.prepend_previewers]]
url = "*.tar*"
run = 'piper --format=url -- tar tf "$1"'

[[plugin.prepend_previewers]]
url = "*.cue*"
run = 'piper -- bat --color=always --style=numbers "$1"'
