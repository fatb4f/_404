name: dotctl
help: Dotfiles lifecycle adapter
version: 0.1.0

commands:
  - name: audit
    help: Dotfiles audit adapter commands
    commands:
      - name: observe
        help: Emit dotfiles audit JSON
        args:
          - name: targets
            repeatable: true
            help: Managed roots to observe

      - name: vet
        help: Vet a dotfiles audit JSON snapshot
        args:
          - name: audit_json
            required: true

      - name: run
        help: Observe and vet dotfiles audit in one command
        args:
          - name: targets
            repeatable: true
            help: Managed roots to observe

  - name: git
    help: Git substrate adapter commands
    commands:
      - name: observe
        help: Emit normalized Git substrate JSON
        filename: git_observe_command.sh

      - name: vet
        help: Vet a Git substrate JSON snapshot
        filename: git_vet_command.sh
        flags:
          - long: --input
            arg: file
            required: true
            help: Git substrate snapshot to vet

      - name: project-state
        help: Project vetted Git substrate state into XDG directories
        filename: git_project_state_command.sh
        flags:
          - long: --input
            arg: file
            required: true
            help: Git substrate snapshot to project

      - name: refresh
        help: Observe, vet, and project Git substrate state
        filename: git_refresh_command.sh

      - name: status
        help: Show Git substrate status summary
        filename: git_status_command.sh

      - name: add
        help: Stage observed Git changes through a gated add plan
        filename: git_add_command.sh
        args:
          - name: paths
            repeatable: true
            help: Paths to stage; defaults to all observed addable paths

  - name: check
    help: Run shell, bootstrap, audit, and yadm checks

  - name: doctor
    help: Inspect Tier-0 service health graph
    filename: doctor_command.sh
    flags:
      - long: --json
        help: Emit doctor graph as JSON
    commands:
      - name: test-tier0
        help: Run Tier-0 robustness checks through the harness
        filename: doctor_test_tier0_command.sh
        flags:
          - long: --backend
            arg: backend
            default: matrix
            help: Select the Tier-0 backend
          - long: --strict
            arg: strict
            default: "true"
            help: Enable strict Tier-0 matrix behavior
          - long: --json
            help: Emit a compact operator result as JSON
          - long: --summary
            help: Emit summary output
          - long: --report-dir
            arg: path
            help: Export Tier-0 artifacts into a report directory

  - name: bootstrap
    help: Run yadm bootstrap

  - name: status
    help: Show yadm repository status

  - name: provision
    help: Run the phase-0 provisioning handoff
