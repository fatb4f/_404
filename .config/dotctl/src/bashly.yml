name: dotctl
help: Dotfiles lifecycle adapter
version: 0.1.0

commands:
  - name: audit
    help: Dotfiles audit adapter commands
    commands:
      - name: observe
        help: Emit dotfiles audit JSON
        args:
          - name: targets
            repeatable: true
            help: Managed roots to observe

      - name: vet
        help: Vet a dotfiles audit JSON snapshot
        args:
          - name: audit_json
            required: true

      - name: run
        help: Observe and vet dotfiles audit in one command
        args:
          - name: targets
            repeatable: true
            help: Managed roots to observe

  - name: git
    help: Git substrate adapter commands
    commands:
      - name: observe
        help: Emit normalized Git substrate JSON
        filename: git_observe_command.sh

      - name: vet
        help: Vet a Git substrate JSON snapshot
        filename: git_vet_command.sh
        flags:
          - long: --input
            arg: file
            required: true
            help: Git substrate snapshot to vet

      - name: project-state
        help: Project vetted Git substrate state into XDG directories
        filename: git_project_state_command.sh
        flags:
          - long: --input
            arg: file
            required: true
            help: Git substrate snapshot to project

      - name: refresh
        help: Observe, vet, and project Git substrate state
        filename: git_refresh_command.sh

      - name: status
        help: Show Git substrate status summary
        filename: git_status_command.sh

  - name: check
    help: Run shell, bootstrap, audit, and yadm checks

  - name: bootstrap
    help: Run yadm bootstrap

  - name: status
    help: Show yadm repository status

  - name: provision
    help: Run the phase-0 provisioning handoff
