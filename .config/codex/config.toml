profile = "dotctl"
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
[projects."/home/x404"]
trust_level = "trusted"

[features]
codex_hooks = true

[profiles.dotctl]
approval_policy = "never"
sandbox_mode = "danger-full-access"
allow_login_shell = true

[profiles.dotctl.shell_environment_policy]
inherit = "core"
ignore_default_excludes = false

[profiles.dotctl.shell_environment_policy.set]
SHELL = "/usr/bin/bash"
XDG_CONFIG_HOME = "/home/x404/.config"
XDG_DATA_HOME = "/home/x404/.local/share"
XDG_STATE_HOME = "/home/x404/.local/state"
XDG_CACHE_HOME = "/home/x404/.cache"
PATH = "/home/x404/.local/bin:/home/x404/.config/dotctl/bin:/usr/local/bin:/usr/bin:/bin"

[tui]
status_line = ["model-with-reasoning", "current-dir", "run-state", "five-hour-limit", "weekly-limit", "task-progress"]

[tui.model_availability_nux]
"gpt-5.5" = 3

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."slack@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = true
